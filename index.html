<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pokédex — codingrid</title>
  <meta name="description" content="Pokédex com PokéAPI: busca, rolagem infinita e detalhes." />

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="./assets/css/global.css" />
  <link rel="stylesheet" href="./assets/css/pokedex.css" />
</head>
<body>
  <div class="content">
    <header class="pdx-header">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <h1>Pokédex <span class="muted">— codingrid</span></h1>
      </div>

      <div class="tools">
        <label class="search" role="search">
          <input id="search" type="search" placeholder="Buscar por nome ou #id…" aria-label="Buscar Pokémon" />
        </label>
      </div>
    </header>

    <main>
      <section id="grid" class="grid" aria-live="polite" aria-busy="false"></section>
      <div id="sentinel" class="sentinel" aria-hidden="true"></div>
    </main>

    <footer class="pdx-footer">
      <p>Dados de <a href="https://pokeapi.co/" target="_blank" rel="noopener">PokéAPI</a>. Feito por codingrid.</p>
    </footer>
  </div>

  <!-- Modal -->
  <dialog id="pokeModal">
    <div class="modal-head">
      <strong id="modalTitle">Detalhes</strong>
      <button class="icon-btn" id="modalClose" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </dialog>

  <!-- JS principal -->
  <script src="./assets/js/main.js" defer></script>
</body>
</html>
